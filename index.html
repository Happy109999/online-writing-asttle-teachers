<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="header" class="header" style="display:none;">
  <div>Online Writing aTTle — Teacher Dashboard</div>
  <div id="headerUser"></div>
</div>

<div id="sidebar" class="sidebar" style="display:none;">
  <a href="index.html">Dashboard</a>
  <a href="create-test.html">Create Test</a>
  <a href="tests.html">Your Tests</a>
  <a href="setup-students.html">Setup Students</a>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

  <div id="loginCard" class="card" style="max-width:500px;margin:auto;">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>

    <p>Don't have an account?  
      <a href="signup.html">Sign up here</a>
    </p>

    <div id="authMsg" style="color:red;margin-top:10px;"></div>
  </div>

  <div id="dashboardCard" class="card" style="display:none;">
    <h2>Welcome</h2>
    <p>Use the menu on the left to manage tests and students.</p>
  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="main.js"></script>

<script>
async function checkLogin() {
  const { data } = await supabase.auth.getUser();

  if (data.user) {
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboardCard").style.display = "block";

    document.getElementById("header").style.display = "flex";
    document.getElementById("sidebar").style.display = "block";

    document.getElementById("headerUser").textContent = data.user.email;
  }
}

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("authMsg");

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) msg.textContent = error.message;
  else location.reload();
};

checkLogin();
</script>

</body>

</html>
